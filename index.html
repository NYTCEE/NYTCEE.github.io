<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Sketch with Sidebar</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
  <script src="sketch.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    /* 主畫面 */
    #menuToggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
    }
    #menuToggle button {
      background-color: #4a90e2;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
    }
    #menuToggle button:hover {
      background-color: #3a7bd5;
    }
    /* 側拉選單 */
    #sideMenu {
      position: fixed;
      top: 0;
      right: -300px;
      width: 300px;
      height: 100%;
      background: linear-gradient(135deg, #ffffff, #e6e6e6);
      box-shadow: -5px 0 15px rgba(0, 0, 0, 0.2);
      padding: 20px;
      transition: all 0.3s ease-in-out;
      z-index: 99;
    }
    #sideMenu.active {
      right: 0;
    }
    #sideMenu h2 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      text-align: center;
    }
    .menu-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background-color: #4a90e2;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
    }
    .menu-btn:hover {
      background-color: #3a7bd5;
    }
    .close-btn {
      background-color: #e74c3c;
    }
    .close-btn:hover {
      background-color: #c0392b;
    }
  </style>
</head>
<body>
  <!-- 選單按鈕 -->
  <div id="menuToggle">
    <button onclick="toggleMenu()">☰ Menu</button>
  </div>

  <!-- 側拉選單 -->
  <div id="sideMenu">
    <button class="menu-btn close-btn" onclick="toggleMenu()">Close</button>
    <h2>Options</h2>
    <button class="menu-btn" onclick="changeSketchMode(1)">Mode 1</button>
    <button class="menu-btn" onclick="changeSketchMode(2)">Mode 2</button>
    <button class="menu-btn" onclick="changeSketchMode(3)">Mode 3</button>
    <button class="menu-btn" onclick="toggleMusic()">Play Music</button>
    <button class="menu-btn" onclick="resetSketch()">Reset View</button>
  </div>

  <script>
    // 側拉選單切換功能
    function toggleMenu() {
      const sideMenu = document.getElementById('sideMenu');
      sideMenu.classList.toggle('active');
    }
  </script>
</body>
</html>
