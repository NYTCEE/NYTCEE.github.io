<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Sketch</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>
  
  <!-- 引用您自己的 sketch.js -->
  <script src="sketch.js"></script>
  <style>
    body { 
      margin: 0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f0f0;
    }
    #menu {
      position: fixed;
      top: 20px;
      left: 20px;
      background: linear-gradient(135deg, #ffffff, #e6e6e6);
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      padding: 20px;
      width: 250px;
      z-index: 100;
    }
    .menu-btn {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background-color: #4a90e2;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .menu-btn:hover {
      background-color: #3a7bd5;
      transform: translateY(-2px);
    }
    #music-btn {
      background-color: #2ecc71;
    }
    #music-btn:hover {
      background-color: #27ae60;
    }
    #reset-btn {
      background-color: #e74c3c;
    }
    #reset-btn:hover {
      background-color: #c0392b;
    }
  </style>
</head>
<body>
  <div id="menu">
    <button class="menu-btn" onclick="changeSketchMode(1)">Mode 1</button>
    <button class="menu-btn" onclick="changeSketchMode(2)">Mode 2</button>
    <button class="menu-btn" onclick="changeSketchMode(3)">Mode 3</button>
    <button id="music-btn" class="menu-btn" onclick="toggleMusic()">Play Music</button>
    <button id="reset-btn" class="menu-btn" onclick="resetSketch()">Reset View</button>
  </div>
  <script>
    let music;
    let isPlaying = false;
    let sketchMode = 1;
    let currentScale = 1;

    function preload() {
      music = loadSound('music.mp3');
    }

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.style('position', 'fixed');
      canvas.style('top', '0');
      canvas.style('left', '0');
      noStroke();
      textAlign(CENTER, CENTER);
    }

    function draw() {
      background(30, 144, 255);
      
      // 縮放效果
      scale(currentScale);
      
      // 根據不同模式繪製不同效果
      switch(sketchMode) {
        case 1:
          fill(255, 140, 0, 150);
          ellipse(mouseX/currentScale, mouseY/currentScale, 80, 80);
          break;
        case 2:
          fill(0, 255, 0, 150);
          rectMode(CENTER);
          rect(mouseX/currentScale, mouseY/currentScale, 100, 100);
          break;
        case 3:
          fill(255, 0, 0, 150);
          triangle(
            mouseX/currentScale, mouseY/currentScale - 50,
            mouseX/currentScale - 50, mouseY/currentScale + 50,
            mouseX/currentScale + 50, mouseY/currentScale + 50
          );
          break;
      }
    }

    function toggleMusic() {
      let musicBtn = select('#music-btn');
      if (isPlaying) {
        music.pause();
        musicBtn.html('Play Music');
      } else {
        music.loop();
        musicBtn.html('Pause Music');
      }
      isPlaying = !isPlaying;
    }

    function changeSketchMode(mode) {
      sketchMode = mode;
    }

    function resetSketch() {
      // 重置視圖縮放
      currentScale = currentScale === 1 ? 1.5 : 1;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
