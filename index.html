<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Sketch with Music and Resizable Canvas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
  <script src="sketch.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Times New Roman', serif;
      overflow: hidden;
    }
    /* 漢堡按鈕 */
    #menuToggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
    }
    #menuToggle button {
      background-color: transparent;
      border: none;
      color: gray;
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      padding: 5px;
    }
    #menuToggle button:hover {
      color: black;
    }
    /* 長條形側拉選單 */
    #sideMenu {
      position: fixed;
      top: 0;
      right: -300px;
      width: 250px;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease-in-out;
      z-index: 99;
      padding: 20px;
    }
    #sideMenu.active {
      right: 0;
    }
    .menu-btn {
      background-color: black;
      color: white;
      border: 2px solid white;
      padding: 10px 20px;
      margin: 10px 0;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      font-family: 'Times New Roman', serif;
      transition: all 0.3s ease-in-out;
    }
    .menu-btn:hover {
      background-color: white;
      color: black;
    }
  </style>
</head>
<body>
  <!-- 漢堡按鈕 -->
  <div id="menuToggle">
    <button onclick="toggleMenu()">☰</button>
  </div>

  <!-- 長條形側拉選單 -->
  <div id="sideMenu">
    <button class="menu-btn" onclick="changeSketchMode(1)">Mode 1</button>
    <button class="menu-btn" onclick="changeSketchMode(2)">Mode 2</button>
    <button class="menu-btn" onclick="changeSketchMode(3)">Mode 3</button>
    <button class="menu-btn" onclick="toggleMusic()">Play Music</button>
    <button class="menu-btn" onclick="resetSketch()">Reset View</button>
  </div>

  <script>
    // 音樂控制變數
    let music;
    let isPlaying = false;

    // 側拉選單切換功能
    function toggleMenu() {
      const sideMenu = document.getElementById('sideMenu');
      sideMenu.classList.toggle('active');
    }

    // 音樂播放與暫停功能
    function preload() {
      music = loadSound('music.mp3'); // 確保音樂文件存在
    }

    function toggleMusic() {
      if (isPlaying) {
        music.pause();
      } else {
        music.loop();
      }
      isPlaying = !isPlaying;
    }

    // 改變模式的功能（占位函數，需在 sketch.js 中定義）
    function changeSketchMode(mode) {
      if (typeof window.changeSketchModeInP5 === "function") {
        window.changeSketchModeInP5(mode);
      } else {
        console.log("changeSketchModeInP5 function is not defined in sketch.js");
      }
    }

    // 重置畫布（占位函數，需在 sketch.js 中定義）
    function resetSketch() {
      if (typeof window.resetSketchInP5 === "function") {
        window.resetSketchInP5();
      } else {
        console.log("resetSketchInP5 function is not defined in sketch.js");
      }
    }
  </script>
</body>
</html>
